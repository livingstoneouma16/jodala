# Minimal production-ish stack: the app + Redis (for correct rate-limiting
# across gunicorn's worker processes -- see gunicorn.conf.py).
#
# This does NOT include a reverse proxy / TLS termination (nginx, Caddy,
# Traefik, or your hosting platform's load balancer) -- you still need one
# in front of this for HTTPS, which M-Pesa callbacks and secure cookies
# both require. See DEPLOYMENT.md.
#
# Usage:
#   cp .env.production.example .env.production   # fill in real values
#   docker compose --env-file .env.production up -d --build

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DB_PATH: /data/sacco.db
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    env_file:
      - .env.production
    volumes:
      - jodala-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=4).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No published port -- only the app service needs to reach Redis, and
    # it does so over the internal compose network.
    volumes:
      - jodala-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  jodala-data:
  jodala-redis:
