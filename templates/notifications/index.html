{% extends "base.html" %}
{% block title %}Notifications — Jodala Microfinance{% endblock %}
{% block page_title %}Notifications{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <div><h4 style="font-family:'Source Serif 4',serif;font-weight:700;margin:0">Notifications</h4>
  <p class="text-muted mb-0" style="font-size:13px">System alerts and reminders</p></div>
  <button class="btn btn-brand-outline btn-sm" onclick="markAll()"><i class="bi bi-check2-all me-1"></i>Mark All Read</button>
</div>
<div class="jd-card">
  <div id="notifFeed"><div class="text-center p-5"><span class="spinner-border spinner-brand"></span></div></div>
  <div class="pagination-wrapper"><div class="page-info" id="nfPageInfo"></div><div class="page-btns" id="nfPageBtns"></div></div>
</div>
{% endblock %}
{% block extra_js %}<script>
async function loadNotifs(page=1) {
  try {
    const data = await API.get(`/notifications/api?page=${page}`);
    document.getElementById('nfPageInfo').textContent = data.unread + ' unread of ' + data.total;
    const feed = document.getElementById('notifFeed');
    const typeIcon = {info:'bi-info-circle',warning:'bi-exclamation-triangle',alert:'bi-bell',success:'bi-check-circle'};
    const typeColor = {info:'#4895EF',warning:'#F4A261',alert:'#E63946',success:'#52B788'};
    if (!data.notifications.length) {
      feed.innerHTML='<div class="empty-state"><i class="bi bi-bell-slash"></i><p>No notifications</p></div>'; return;
    }
    feed.innerHTML = data.notifications.map(n=>`
      <div class="d-flex gap-3 p-4 border-bottom ${n.is_read?'':''}">
        <div style="width:36px;height:36px;border-radius:50%;background:${n.is_read?'var(--surface-2)':'var(--brand-pale)'};display:grid;place-items:center;flex-shrink:0">
          <i class="bi ${typeIcon[n.notification_type]||'bi-bell'}" style="color:${typeColor[n.notification_type]||'var(--text-muted)'}"></i></div>
        <div style="flex:1">
          <div style="font-weight:${n.is_read?'400':'600'};font-size:13px">${escapeHtml(n.title)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${escapeHtml(n.message)}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${timeAgo(n.created_at)}</div>
        </div>
        ${!n.is_read?`<button onclick="markRead(${n.id},this)" class="btn btn-sm" style="padding:2px 8px;font-size:11px;background:var(--surface-2);border:1px solid var(--border);flex-shrink:0;height:fit-content">Mark read</button>`:''}
      </div>`).join('');
    renderPagination('nfPageBtns', data.current_page||page, data.pages, loadNotifs);
  } catch(e) { Toast.error('Failed to load notifications'); }
}

async function markRead(id, btn) {
  try {
    await API.post(`/dashboard/notifications/${id}/read`, {});
    btn.closest('.d-flex').style.opacity = '0.6';
    btn.remove();
  } catch(e) {}
}

async function markAll() {
  try {
    await API.post('/notifications/api/mark-all-read', {});
    Toast.success('All notifications marked as read');
    loadNotifs();
  } catch(e) { Toast.error(e.message); }
}

loadNotifs();
</script>{% endblock %}
