name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install PostgreSQL server binaries
        # pytest-postgresql spins up its own throwaway Postgres instance for
        # the test session using local initdb/pg_ctl -- it doesn't need a
        # separate "services:" Postgres container, just the binaries below.
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          JWT_SECRET_KEY: test-secret-do-not-use-in-prod
          SECRET_KEY: test-secret-do-not-use-in-prod
          ENABLE_OVERDUE_SCHEDULER: "false"
        run: |
          pytest -v
