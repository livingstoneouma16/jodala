# Render Blueprint -- deploys this app + a managed PostgreSQL database + a
# Redis (Key Value) instance for correct multi-worker rate limiting.
#
# Deploy: push this repo to GitHub/GitLab, then in the Render dashboard:
#   New -> Blueprint -> select this repo. Render reads this file and
#   provisions everything below automatically.
#
# Recommended: sign up for Render using jodalamicrofinance@gmail.com so the
# deployment and billing live under one account (email notifications
# themselves go through Resend -- see below -- not this Gmail account;
# Render blocks outbound SMTP, so Gmail SMTP can't be used to send mail).
#
# After the first deploy, go to the web service's Settings > Environment
# and fill in the `sync: false` variables (Resend/M-Pesa credentials) --
# Render prompts for these during Blueprint creation, or you can add them
# manually afterwards. They can also be set later from inside the app under
# Settings > Notifications / Settings > M-Pesa instead, which takes
# precedence over env vars either way.
#
# Because the database is now PostgreSQL (not a local SQLite file), this
# web service has no disk and can be scaled to multiple instances if needed.
#
# Region: this app is used from Kenya (M-Pesa integration, Africa/Nairobi
# scheduler timezone elsewhere in the config) -- Render's regions are
# Oregon, Ohio, Virginia (all US), Frankfurt, and Singapore, no Africa
# region yet. Frankfurt is the closest of those to Nairobi by a wide margin
# (roughly a one-hop, same-continent-adjacent route vs. transatlantic +
# cross-US for Oregon), so every service below is pinned to `frankfurt`
# rather than the US regions Render defaults to. All three must stay in the
# same region -- Render's private networking (which DATABASE_URL and
# RATELIMIT_STORAGE_URI below rely on) doesn't span regions.

services:
  - type: web
    name: jodala-microfinance
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jodala-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: RATELIMIT_STORAGE_URI
        fromService:
          type: keyvalue
          name: jodala-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      # M-Pesa / Resend credentials -- set once in the Render dashboard
      # (prompted on first Blueprint deploy), or skip these entirely and
      # configure them from inside the app under Settings instead. Email
      # must go through Resend's HTTP API, not Gmail SMTP -- Render blocks
      # outbound SMTP ports at the network level.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false

  - type: keyvalue
    name: jodala-redis
    plan: starter
    region: frankfurt
    maxmemoryPolicy: noeviction
    # Render requires this field on every Key Value service. Empty list =
    # no external/public access -- only other services in this Blueprint
    # (i.e. the web service above) can reach it, which is all we need.
    ipAllowList: []

databases:
  - name: jodala-db
    plan: starter
    region: frankfurt
    databaseName: jodala
    user: jodala
